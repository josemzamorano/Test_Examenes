<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrenamiento de Tests Dyaso</title>
  <link rel="stylesheet" href="styles.css">
<style>
/* Estilo general */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background-color: #f4f4f4;
}

#timer {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 24px;
  font-weight: bold;
  background-color: rgba(255, 255, 255, 0.9);
  padding: 5px 15px;
  border-radius: 5px;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
  z-index: 1000;
}

#container {
  text-align: center;
  width: 80%;
  max-width: 600px;
  background: #fff;
  padding: 20px;
  box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
  border-radius: 8px;
}

.mode-group {
  display: flex;
  align-items: center;
  gap: 15px;
  width: 80%;
  margin: 10px auto;
  padding: 8px;
  background-color: #f8f9fa;
  border-radius: 8px;
  transition: background-color 0.2s;
}

.mode-group:hover {
  background-color: #f1f1f1;
}

/* Ocultar elementos */
.hidden {
  display: none;
}

.mode-description {
  flex: 1;
  padding: 8px;
  font-size: 13px;
  color: #555;
  line-height: 1.4;
  border-left: 2px solid #e0b115;
  margin-left: 10px;
}

/* Contenedor del modo estudio */
.study-mode-container {
  width: 100%;
  display: flex;
  align-items: flex-start;
  gap: 15px;
}

/* Contenedor del input */
.study-input-container {
  margin-top: 10px;
  padding: 8px;
  background-color: #fff;
  border-radius: 4px;
  border: 1px solid #e0b115;
}

.study-input-container label {
  display: block;
  font-size: 12px;
  color: #666;
  margin-bottom: 4px;
  margin-top: 12px;
  padding: 10px;
}

/* Contenedor de botones de navegación */
.nav-buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  width: 100%;
}

.centered-container {
  width: 100%;
  max-width: 700px; /* Mismo ancho que la pregunta y opciones */
  margin: 15px auto;
  display: flex;
  justify-content: center;
}

.test-content-wrapper {
  width: 100%;
  max-width: 700px; /* Igual que pregunta/opciones */
  margin: 0 auto; /* Centrado respecto a la pantalla */
}

#study-question-number {
  width: 240px;
  padding: 6px;
  font-size: 14px;
  border: 1px solid #ddd;
  border-radius: 3px;
  text-align: center;
}

#study-question-number:focus {
  outline: 2px solid #e0b115;
  border-color: transparent;
}

#study-mode {
  min-height: 145px;  /* Altura mínima aumentada */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 15px; /* Más padding vertical */
  font-size: 16px;    /* Tamaño de fuente ligeramente mayor */
  line-height: 1.3;
}

/* Selector de modo */
#mode-selector button {
  flex: 0 0 200px;
  display: block;
  width: 80%;
  margin: 0;
  margin-bottom: 5px;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #718081;;
  border-radius: 5px;
  background-color: #ebebeb;
  text-align: left;
  white-space: nowrap;
  color: #000;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

#mode-selector button:hover {
  background-color: #aab4b5;
  border-color: #636f70;
}

#mode-selector label {
  display: block;
  margin-top: 20px;
}

@media (max-width: 600px) {
  .mode-group {
    flex-direction: column;
    align-items: stretch;
    gap: 5px;
  }
  
  #mode-selector button {
    flex: none;
    width: 100%;
    text-align: center;
  }
  
  .mode-description {
    border-left: none;
    border-top: 2px solid #e0b115;
    margin-left: 0;
    padding-top: 8px;
  }

  #study-mode {
    min-height: 60px;
    width: 100%;
  }

  .study-mode-container {
    align-items: stretch;
    flex-direction: column;
  }
  
  .study-input-container {
    gap: 10px;
    width: 100%;
  }
  
  #study-question-number {
    width: 100%;
  }
}

/* Contenedor del test */
#test-container {
  text-align: center;
}

#test-container > button {
  margin: 15px 5px;
  display: inline-block;
}

#question {
  font-size: 18px;
  font-weight: bold;
  max-width: 700px; /* Ajusta el ancho máximo */
  margin: 0 auto; /* Centra el contenido horizontalmente */
  text-align: left; /* Opcional: alinea el texto a la izquierda para mejorar la lectura */
  word-wrap: break-word; /* Evita que el texto se desborde */
}

#options-container {
  margin: 20px 0;
  max-width: 700px; /* Ajusta el ancho máximo */
  margin: 0 auto; /* Centra el contenido horizontalmente */
  text-align: left; /* Opcional: alinea el texto a la izquierda para mejorar la lectura */
  word-wrap: break-word; /* Evita que el texto se desborde */
}

#options-container button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 5px;
  background-color: rgba(173, 216, 230, 0.7); /* Azul claro */
  color: black;
  cursor: pointer;
  transition: all 0.3s;
}

#options-container button:hover {
  background-color: rgba(173, 216, 230, 1);
}

#options-container button.correct {
  background-color: rgba(144, 238, 144, 0.9); /* Verde claro */
  border-color: #006400;
  font-weight: bold;
}

#options-container button.incorrect {
  background-color: rgba(255, 182, 193, 0.9); /* Rojo claro */
  border-color: #8b0000;
  font-weight: bold;
}

#stats {
  font-size: 16px;
  font-weight: bold;
  text-align: center;
  padding: 8px 15px;
  background: #f4f4f4;
  border-radius: 5px;
  display: inline-block;

}

/* Feedback */
#feedback {
  margin: 20px 0;
  font-size: 18px;
  font-weight: bold;
}

#feedback.correct {
  color: #006400; /* Verde oscuro */
}

#feedback.incorrect {
  color: #8b0000; /* Rojo oscuro */
}

/* Botón siguiente */
#next-button {
  width: auto;
  min-width: 120px;
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 5px;
  background-color: #007bff;
  color: white;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

#next-button:disabled {
  background-color: #ccc;
  cursor: not-allowed;
}

/* Botón atrás */
#prev-button {
  width: auto;
  min-width: 120px;
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 5px;
  background-color: #6c757d;
  color: white;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

#prev-button:disabled {
  background-color: #cccccc;
  cursor: not-allowed;
}

#next-button:hover:not(:disabled) {
  background-color: #0056b3;
}

/* Contenedor de reinicio */
#restart-container {
  margin-top: 30px; /* Separación del contenido anterior */
  text-align: center;
  width: 100%;
}

#restart-container button {
  display: inline-block;
  margin: 10px 5px; /* Espaciado entre botones */
  padding: 10px 20px;
  font-size: 16px;
  font-weight: bold; /* Hacer el texto más grueso */
  border: none;
  border-radius: 5px;
  background-color: #e0b115;
  border-color: #020202;
  color: white;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

#restart-container button:hover {
  background-color: #b39125;
  border-color: #020202;
}

#test-completed-text {
    text-align: center; /* Centra el texto horizontalmente */
    color: #e0b115; /* Cambia el color del texto */
    font-size: 24px; /* Tamaño del texto */
    text-align: center; /* Centrar el texto */
    margin-top: 20px; /* Espaciado superior */
    font-weight: bold; /* Hacer el texto más grueso */
}

/* Mejora de accesibilidad táctil */
button {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent; /* Elimina el destello azul en móviles */
}

</style>
</head>
<body>
  <div id="timer">00:00</div>
  <div id="mode-selector">
    <h1>DYASO - Preguntas Test - Seleccione un modo:</h1>
  
    <div class="mode-group">
      <button id="complete-test">Test Completo</button>
      <div class="mode-description">Test de todas las preguntas (orden aleatorio)</div>
    </div>
  
    <div class="mode-group">
      <button id="random-test">10 preguntas</button>
      <div class="mode-description">Test de 10 preguntas aleatorias</div>
    </div>
  
    <div class="mode-group">
      <button id="test-20">20 preguntas</button>
      <div class="mode-description">Test de 20 preguntas aleatorias</div>
    </div>
  
    <div class="mode-group">
      <button id="test-30">30 preguntas</button>
      <div class="mode-description">Test de 30 preguntas aleatorias</div>
    </div>
  
  <div class="mode-group">
    <div class="study-mode-container">
      <button id="study-mode">Modo Estudio</button>
      <div class="mode-description">
        Preguntas en orden - Cada 10 nuevas, las ultimas 10 se repiten
        <div class="study-input-container">
          <label for="study-question-number">Index Modo Estudio:</label>
          <input type="number" 
                 id="study-question-number" 
                 min="1" 
                 value=null
                 placeholder="Nº Pregunta Inicial">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="test-container" class="hidden">
    <div class="test-content-wrapper">
      <div id="question"></div>
      <div id="options-container"></div>
      <div id="feedback" class="hidden"></div>
      <div class="nav-buttons">
        <button id="prev-button" disabled>Anterior</button>
        <div id="stats"></div>
        <button id="next-button" disabled>Siguiente</button>
      </div>
      <div id="restart-container" class="hidden">
        <button id="back-to-selector">Volver al Selector</button>
      </div>
    </div>
  </div>
<script>
const questions = [



    // ------------------------------------------------------------------------- PREGUNTAS  -------------------------------------------------------------------------
            
    
	{
        "text": "1. ¿Qué es un proceso en el sistema operativo UNIX?",
        "options": [
            "Una instancia de un programa en ejecución.",
            "Un archivo ejecutable almacenado en el disco duro.",
            "Una función interna del núcleo del sistema operativo.",
            "Un espacio de memoria virtual reservado para el hardware."
        ],
        "correct": 0,
        "note": "Un proceso es una instancia de un programa en ejecución [1, 2]."
    },
    {
        "text": "2. ¿En qué niveles o capas se divide la arquitectura del sistema operativo UNIX?",
        "options": [
            "Hardware, núcleo, programas estándar y aplicaciones.",
            "Núcleo, procesos ligeros, hebras de usuario y hardware.",
            "Gestión de memoria, sistema de ficheros, procesos y hardware.",
            "Modo usuario, modo supervisor, intérprete de comandos y aplicaciones."
        ],
        "correct": 0,
        "note": "La arquitectura del sistema operativo UNIX se divide en cuatro niveles: nivel de hardware, nivel del núcleo, programas estándar y aplicaciones [3-5]."
    },
    {
        "text": "3. ¿Qué acción principal realiza la llamada al sistema fork?",
        "options": [
            "Permite al usuario crear un nuevo proceso (hijo) a partir del proceso invocador (padre).",
            "Carga y ejecuta un nuevo programa, reemplazando el contexto del proceso actual.",
            "Finaliza la ejecución del proceso y devuelve un código de retorno a su padre.",
            "Pone a dormir el proceso actual a la espera de un evento de entrada/salida."
        ],
        "correct": 0,
        "note": "La llamada al sistema fork permite al usuario crear un nuevo proceso, denominándose padre al invocador e hijo al proceso recién creado [6, 7]."
    },
    {
        "text": "4. ¿Qué valor devuelve la llamada al sistema fork() al proceso hijo si la creación se ejecuta con éxito?",
        "options": [
            "0.",
            "El PID del nuevo proceso hijo creado.",
            "El PID del proceso padre.",
            "-1."
        ],
        "correct": 0,
        "note": "La llamada fork() posee un único parámetro de salida que vale 0 para el proceso hijo, y el PID del hijo para el proceso padre [8]."
    },
    {
        "text": "5. ¿Cuál es la función principal de la llamada al sistema exec?",
        "options": [
            "Invocar desde un proceso a otro programa ejecutable, sustituyendo sus regiones de código, datos y pila.",
            "Clonar el contexto de un proceso para ejecutar dos rutinas en paralelo.",
            "Cambiar el nivel de prioridad de interrupción (npi) del núcleo.",
            "Crear un hilo de usuario dentro de un proceso ligero existente."
        ],
        "correct": 0,
        "note": "La llamada al sistema exec sirve para invocar desde un proceso a otro programa ejecutable, sustituyendo las regiones de código, datos y pila del proceso invocador [9, 10]."
    },
    {
        "text": "6. ¿Qué realiza un proceso cuando ejecuta la llamada al sistema wait?",
        "options": [
            "Sincroniza su ejecución con la terminación de uno de sus procesos hijos.",
            "Pasa a un estado dormido ininterrumpible durante un tiempo fijado.",
            "Espera a que un dispositivo bloqueado de entrada/salida quede libre.",
            "Detiene la ejecución del intérprete de comandos hasta pulsar una tecla."
        ],
        "correct": 0,
        "note": "La llamada al sistema wait permite que un proceso sincronice su ejecución con la terminación de un proceso hijo [11, 12]."
    },
    {
        "text": "7. ¿Qué es un proceso en estado zombi en UNIX?",
        "options": [
            "Un proceso que ha finalizado su ejecución mediante exit pero mantiene su entrada en la tabla de procesos.",
            "Un proceso que se ha quedado colgado en un bucle infinito.",
            "Un proceso demonio que se ejecuta en segundo plano sin terminal.",
            "Un proceso huérfano que ha sido adoptado por el proceso inicial."
        ],
        "correct": 0,
        "note": "Cuando un proceso invoca la llamada exit, el núcleo lo pasa al estado zombi y elimina todo su contexto excepto su entrada en la tabla de procesos [13]."
    },
    {
        "text": "8. ¿Qué es el \"ladrón de páginas\" en un sistema UNIX?",
        "options": [
            "Un proceso del núcleo que transfiere al dispositivo de intercambio las páginas que ya no forman parte del conjunto de trabajo.",
            "Un error de hardware en la MMU que corrompe las direcciones de memoria virtual.",
            "Una política del planificador round robin para quitar ciclos de CPU a procesos de baja prioridad.",
            "Una excepción producida al intentar escribir en una página de memoria de solo lectura."
        ],
        "correct": 0,
        "note": "El ladrón de páginas es un proceso del núcleo que se encarga de transferir al dispositivo de intercambio las páginas que ya no forman parte del conjunto de trabajo de un proceso [14, 15]."
    },
    {
        "text": "9. En relación a los modos de ejecución, ¿cuáles son los dos modos existentes en un sistema UNIX?",
        "options": [
            "Modo núcleo (o supervisor) y modo usuario.",
            "Modo batch y modo interactivo.",
            "Modo lectura y modo escritura/ejecución.",
            "Modo de proceso ligero y modo de hebra de usuario."
        ],
        "correct": 0,
        "note": "La ejecución de los procesos en el sistema UNIX está dividida en dos modos: modo núcleo (o supervisor) de mayor privilegio y modo usuario de menor privilegio [16, 17]."
    },
    {
        "text": "10. ¿Cuáles son las dos fases principales del mecanismo de señalización en UNIX?",
        "options": [
            "Generación y recepción (o tratamiento).",
            "Compilación y ejecución.",
            "Bloqueo y enmascaramiento.",
            "Interrupción y excepción."
        ],
        "correct": 0,
        "note": "En el mecanismo de las señales se distinguen dos fases principalmente: generación y recepción o tratamiento [18, 19]."
    },
    {
        "text": "11. ¿Qué es la tabla de procesos?",
        "options": [
            "Una estructura global del núcleo donde se almacena información de control relevante sobre cada proceso existente en el sistema.",
            "Una tabla de páginas que relaciona las direcciones virtuales con las físicas.",
            "Un fichero en /etc/ que lista los programas ejecutables disponibles para un usuario.",
            "Una estructura local en el área U que guarda el historial de comandos ejecutados."
        ],
        "correct": 0,
        "note": "La tabla de procesos es una estructura global del núcleo donde se almacena información de control relevante sobre cada proceso existente en el sistema [20, 21]."
    },
    {
        "text": "12. ¿Qué estructura de datos contiene información administrativa y metadatos sobre un fichero, como su tipo y permisos?",
        "options": [
            "El nodo-i (nodo índice).",
            "El superbloque.",
            "La cabecera primaria del fichero.",
            "El conmutador de dispositivos."
        ],
        "correct": 0,
        "note": "Un nodo-i o nodo índice es una estructura de datos que contiene información administrativa, o metadatos del fichero, como tipo de fichero y permisos [22, 23]."
    },
    {
        "text": "13. ¿Qué utilidad tiene el programa fsck en UNIX?",
        "options": [
            "Revisar y reparar de forma interactiva inconsistencias en el sistema de ficheros.",
            "Montar un nuevo disco en el árbol de directorios del sistema.",
            "Cambiar la máscara de permisos de los ficheros de un usuario.",
            "Comprimir archivos en formato tar.gz."
        ],
        "correct": 0,
        "note": "El programa fsck revisa y repara de forma interactiva las posibles inconsistencias que encuentra en los sistemas de ficheros UNIX para verificar su consistencia [24, 25]."
    },
    {
        "text": "14. ¿Qué significa tener activado el bit S_ISUID en la máscara de modo de un fichero ejecutable?",
        "options": [
            "Que al ejecutarse, el proceso adquirirá el identificador de usuario efectivo (euid) del propietario del fichero.",
            "Que el fichero es un enlace simbólico y apunta a un directorio.",
            "Que el fichero está bloqueado en memoria (sticky bit) y no será enviado al área de intercambio.",
            "Que solo el superusuario puede ejecutar ese comando."
        ],
        "correct": 0,
        "note": "La activación del bit S_ISUID le indica al núcleo que cuando un proceso ejecute este fichero debe asignar al identificador de usuario efectivo (euid) el valor del uid del propietario del fichero [26, 27]."
    },
    {
        "text": "15. ¿Qué limitación importante tienen las tuberías sin nombre frente a los ficheros FIFO?",
        "options": [
            "Solamente pueden ser utilizadas por el proceso que hace la llamada y sus descendientes.",
            "Requieren ser borradas de forma explícita del disco cuando no se usan.",
            "Tienen un nombre en el sistema de ficheros visible para todos los usuarios.",
            "Permiten comunicación bidireccional mediante descriptores aleatorios."
        ],
        "correct": 0,
        "note": "Las tuberías sin nombre se crean invocando a pipe y solamente pueden ser utilizadas por el proceso que hace la llamada y sus descendientes [28]."
    },
    {
        "text": "16. ¿Qué llamada al sistema permite crear un segmento de memoria compartida o acceder a uno existente?",
        "options": [
            "shmget.",
            "semget.",
            "msgget.",
            "shmat."
        ],
        "correct": 0,
        "note": "La llamada al sistema shmget crea un segmento de memoria compartida o permite acceder a uno que ya existe usando una clave [29, 30]."
    },
    {
        "text": "17. ¿Qué llamada al sistema crea u obtiene un conjunto de semáforos en System V?",
        "options": [
            "semget.",
            "shmget.",
            "semop.",
            "msgctl."
        ],
        "correct": 0,
        "note": "La llamada al sistema semget crea u obtiene un array o conjunto de semáforos [29, 30]."
    },
    {
        "text": "18. ¿Qué realiza un proceso cuando invoca a la llamada al sistema msgsnd?",
        "options": [
            "Enviar un mensaje desde su espacio de direcciones a una determinada cola de mensajes.",
            "Extraer el mensaje más antiguo de una tubería con nombre.",
            "Crear un buzón de señales asíncronas para el núcleo.",
            "Desbloquear una hebra de usuario esperando en una variable de condición."
        ],
        "correct": 0,
        "note": "La llamada al sistema msgsnd permite a un proceso enviar un mensaje desde su espacio de direcciones a una determinada cola de mensajes [31, 32]."
    },
    {
        "text": "19. ¿Cuál es el propósito de la llamada al sistema nice?",
        "options": [
            "Aumentar o disminuir el factor de amabilidad (prioridad) del proceso que la invoca.",
            "Devolver el tiempo de ejecución consumido por un proceso y sus hijos.",
            "Fijar la fecha y hora actuales del sistema operativo.",
            "Dormir el proceso un número determinado de milisegundos."
        ],
        "correct": 0,
        "note": "La llamada al sistema nice permite aumentar o disminuir el factor de amabilidad actual del proceso que la invoca [33, 34]."
    },
    {
        "text": "20. ¿Para qué utiliza el núcleo el algoritmo interno sleep()?",
        "options": [
            "Para pasar a un proceso al estado dormido en memoria a la espera de que ocurra un evento determinado.",
            "Para generar una señal SIGALRM pasado un tiempo programado.",
            "Para detener temporalmente el tratamiento de todas las interrupciones del hardware.",
            "Para expropiar la CPU a un proceso y dársela a un proceso zombi."
        ],
        "correct": 0,
        "note": "El núcleo usa el algoritmo sleep() para pasar a un proceso al estado dormido, requiriendo como parámetros la prioridad para dormir y la dirección o canal asociada al evento [35, 36]."
    },
    {
        "text": "21. ¿Qué es un nodo-i (nodo índice) en el sistema de ficheros de UNIX?",
        "options": [
            "Una estructura de datos que contiene metadatos del fichero y el array de direcciones de los bloques físicos de datos.",
            "Un bloque del disco que almacena el contenido en texto plano de un fichero ordinario.",
            "Un puntero en la tabla de procesos que indica qué ficheros tiene abiertos el proceso en ese momento.",
            "Un registro del hardware utilizado por la MMU para la traducción de direcciones virtuales a físicas."
        ],
        "correct": 0,
        "note": "Un nodo-i o nodo índice es una estructura de datos que contiene información administrativa, o metadatos del fichero. El elemento fundamental es el array de direcciones de bloques de datos de disco (di_addr)."
    },
    {
        "text": "22. ¿Cuál de las siguientes afirmaciones sobre los enlaces duros es correcta?",

// Estado de la aplicación
let currentQuestionIndex = 0;

let correctAnswers = 0;
let incorrectAnswers = 0;

let selectedMode = "complete";

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("complete-test").addEventListener("click", () => {
    selectedMode = "complete";
    startTest();
  });

  document.getElementById("random-test").addEventListener("click", () => {
    selectedMode = "random";
    startTest();
  });

  document.getElementById("test-20").addEventListener("click", () => {
    selectedMode = "test-20";
    startTest();
  });

  document.getElementById("test-30").addEventListener("click", () => {
    selectedMode = "test-30";
    startTest();
  });

  document.getElementById("back-to-selector").addEventListener("click", () => {
    resetToSelector();
  });
  document.getElementById("study-mode").addEventListener("click", () => {
  selectedMode = "study";
  startTest();
});

  nextButton.addEventListener("click", () => {
    if (currentQuestionIndex < currentQuestions.length - 1) {
    currentQuestionIndex++;
    updateNavigationButtons();
    displayQuestion();
  } else {
    finishTest(); // Activar el final del test al llegar a la última pregunta
  }
  });

  prevButton.addEventListener("click", () => {
      if (selectedMode === "study") {
          // Bloquear retroceso entre bloques
          if (studyRepetition > 0 && currentQuestionIndex === 0) {
              return; // No hacer nada si intenta retroceder del primer ciclo de repetición
          }
      }
    
    currentQuestionIndex = Math.max(0, currentQuestionIndex - 1); // Nunca menor a 0
    updateNavigationButtons();
    displayQuestion();
  });
});

// =======================================================================
// ======================= MANEJO DEL TEMPORIZADOR =======================
// =======================================================================
function updateTimer() {
  const currentTime = Date.now();
  elapsedTime = Math.floor((currentTime - startTime) / 1000);
  const minutes = Math.floor(elapsedTime / 60).toString().padStart(2, '0');
  const seconds = (elapsedTime % 60).toString().padStart(2, '0');
  document.getElementById("timer").textContent = `${minutes}:${seconds}`;
}

// ======================= INICIALIZACIÓN =======================
// ==============================================================
document.title = "Entrenamiento de Tests SEGURIDAD";


// ====================================================================
// ======================= FUNCIONES AUXILIARES =======================
// ====================================================================

const shuffledOptions = shuffle(
  question.options.map((option, index) => ({ option, index }))
);

function updateNavigationButtons() {
    // Deshabilitar "Anterior" en estos casos:
    const disablePrev = currentQuestionIndex === 0 || 
                       (selectedMode === "study" && 
                        currentQuestionIndex === 0 && 
                        studyRepetition === 0);
    
    prevButton.disabled = disablePrev;
    
    // Deshabilitar "Siguiente" si no hay respuesta
    nextButton.disabled = currentQuestionIndex === currentQuestions.length - 1 && 
                         !answeredQuestions.has(currentQuestionIndex);
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

// =====================================================================
// ======================= FUNCIONES PRINCIPALES =======================
// =====================================================================

function startTest() {
  // Resetear el temporizador
  clearInterval(timerInterval);
  elapsedTime = 0;
  document.getElementById("timer").textContent = "00:00";
  
  // Iniciar nuevo temporizador
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
    if (selectedMode === "study") {
        // Obtener el número máximo de preguntas disponible
        const maxQuestions = questions.length;
    
        // Obtener el número de la pregunta desde la entrada del usuario
        let startQuestion = parseInt(document.getElementById("study-question-number").value, 10);

        if (isNaN(startQuestion) || startQuestion < 1 || startQuestion > maxQuestions) {
          alert(`Por favor, ingrese un número entre 1 y ${maxQuestions}.`);
          return;
        }

        // Determinar el bloque correcto
        studyBlockIndex = Math.floor((startQuestion-1) / 10);
        studyRepetition = 0; // Sin repeticiones aún

        // Obtener las 10 preguntas del bloque correspondiente
        currentQuestions = questions.slice(studyBlockIndex * 10, studyBlockIndex * 10 + 10);

        // Calcular el índice dentro del bloque
        currentQuestionIndex = (startQuestion % 10 === 0) ? 9 : (startQuestion % 10) - 1 

    } else if (selectedMode === "random") {
        currentQuestions = shuffle(questions).slice(0, 10);
    } else if (selectedMode === "test-20") {
        currentQuestions = shuffle(questions).slice(0, 20);
    } else if (selectedMode === "test-30") {
        currentQuestions = shuffle(questions).slice(0, 30);
    } else {
        currentQuestions = shuffle(questions); // Modo completo
    }

    // Reiniciar variables comunes
    correctAnswers = 0;
    incorrectAnswers = 0;
    answeredQuestions.clear();

    // Mostrar contenedores correctos
    modeSelector.classList.add("hidden");
    testContainer.classList.remove("hidden");
    restartContainer.classList.add("hidden");

    // Mostrar la primera pregunta en la secuencia correcta
    updateNavigationButtons();
    displayQuestion();
}

function displayQuestion() {
  let questionInfo = "";
  if (selectedMode === "study") {
    let match = currentQuestions[currentQuestionIndex].text.match(/^(\d+)\./);
    let absoluteQuestionIndex = match ? parseInt(match[1], 10) : studyBlockIndex * 10 + currentQuestionIndex + 1;
    questionInfo = `
      <p><strong>Bucle ${studyRepetition + 1}/2</strong></p>
      <p><strong>Pregunta ${absoluteQuestionIndex}/${questions.length}</strong></p>
    `;
  } else {
    questionInfo = `<p><strong>Pregunta ${currentQuestionIndex + 1}/${currentQuestions.length}</strong></p>`;
  }

  const question = currentQuestions[currentQuestionIndex];
  const shuffledOptions = shuffle(
    question.options.map((option, index) => ({ option, index }))
  );

  // Crear el mapeo explícito entre índices originales y mezclados
  indexMapping = shuffledOptions.map(({ index }) => index);

  questionElement.innerHTML = `${questionInfo}<p>${question.text}</p>`;
  optionsContainer.innerHTML = "";

  // Limpiar clases previas de las opciones
  Array.from(optionsContainer.children).forEach((button) => {
    button.classList.remove("correct", "incorrect");
  });

  shuffledOptions.forEach(({ option }, domIndex) => {
    const button = document.createElement("button");
    button.textContent = option;
    button.addEventListener("click", () => handleAnswer(button, domIndex));
    optionsContainer.appendChild(button);
  });

  // Restaurar el estado de la respuesta previa
  if (answeredQuestions.has(currentQuestionIndex)) {
    const prevAnswer = answeredQuestions.get(currentQuestionIndex);
    const correctDomIndex = indexMapping.indexOf(question.correct);

    if (prevAnswer.correct) {
      // Si la respuesta previa fue correcta, resaltar solo la correcta
      optionsContainer.children[correctDomIndex].classList.add("correct");
      feedbackElement.textContent = "¡Respondiste correctamente!";
    } else {
      // Si la respuesta fue incorrecta, mostrar la opción correcta sin resaltar
      const correctOption = question.options[question.correct];
      feedbackElement.innerHTML = `Respondiste incorrectamente. La opción correcta era: <br>${correctOption}`;
    }

    feedbackElement.className = prevAnswer.correct ? "correct" : "incorrect";
    feedbackElement.classList.remove("hidden");
    nextButton.disabled = false;

    // Deshabilitar todos los botones
    Array.from(optionsContainer.children).forEach((button) => (button.disabled = true));
  } else {
    // Si no se respondió previamente, ocultar el feedback
    feedbackElement.classList.add("hidden");
    nextButton.disabled = true;
  }

  statsElement.innerHTML = `Aciertos: ${correctAnswers} | Fallos: ${incorrectAnswers}`;
}

function handleAnswer(selectedButton, selectedDomIndex) {
  const question = currentQuestions[currentQuestionIndex];

  // Obtener el índice original correspondiente al índice seleccionado en el DOM
  const selectedOriginalIndex = indexMapping[selectedDomIndex];

  const correct = selectedOriginalIndex === question.correct;
  if (correct) {
    correctAnswers++;
    feedbackElement.innerHTML = `¡Correcto!<br>${question.note || ""}`;
    feedbackElement.className = "correct";
    selectedButton.classList.add("correct");
  } else {
    incorrectAnswers++;
    feedbackElement.innerHTML = `Incorrecto. La respuesta correcta es: <br>${question.options[question.correct]} <br><br>${question.note || ""}`;
    feedbackElement.className = "incorrect";
    selectedButton.classList.add("incorrect");

    // Resaltar la respuesta correcta usando el índice en el DOM
    const correctDomIndex = indexMapping.indexOf(question.correct);
    optionsContainer.children[correctDomIndex].classList.add("correct");
  }

  feedbackElement.classList.remove("hidden");
  nextButton.disabled = false;
  Array.from(optionsContainer.children).forEach((button) => (button.disabled = true));

  answeredQuestions.set(currentQuestionIndex, {
    index: selectedDomIndex,
    correct,
    feedback: feedbackElement.textContent,
  });
}

function resetToSelector() {
  // Reiniciar variables relacionadas con el test
  currentQuestionIndex = 0;
  correctAnswers = 0;
  incorrectAnswers = 0;
  currentQuestions = [];
  answeredQuestions.clear();
  studyBlockIndex = 0;
  studyRepetition = 0;

  // Ocultar contenedores relacionados con el test
  testContainer.classList.add("hidden");
  restartContainer.classList.add("hidden");

  // Mostrar el selector de modos
  modeSelector.classList.remove("hidden");

  // Limpiar los elementos dinámicos
  questionElement.textContent = "";
  optionsContainer.innerHTML = "";
  feedbackElement.textContent = "";
  statsElement.textContent = "";

  // Reiniciar el título del documento si es necesario
  document.title = "Entrenamiento de Tests SEGURIDAD";

  // Detener y resetear el temporizador
  clearInterval(timerInterval);
  document.getElementById("timer").textContent = "00:00";
  elapsedTime = 0;

  console.log("Interfaz restablecida al selector.");
}

function finishTest() {
  if (selectedMode === "study") {
    studyRepetition++;

    if (studyRepetition < 2) {
      // Repetir el bloque actual
      answeredQuestions.clear(); // Reiniciar respuestas previas
      currentQuestionIndex = 0; // Reiniciar índice de preguntas
      displayQuestion();
      return;
    }

    // Pasar al siguiente bloque
    studyBlockIndex++;
    const startIndex = studyBlockIndex * 10;

    if (startIndex < questions.length) {
      studyRepetition = 0;
      currentQuestions = questions.slice(startIndex, startIndex + 10);
      currentQuestionIndex = 0;
      answeredQuestions.clear();
      displayQuestion();
      return;
    }
  }

  // Detener el temporizador
  clearInterval(timerInterval);

  // Actualizar el texto de finalización
  const timeMessage = `Tiempo total: ${document.getElementById("timer").textContent}`;

  // Si no es el modo estudio o se ha completado, mostrar el mensaje de finalización
  questionElement.innerHTML = '<h2 id="test-completed-text">¡Test finalizado!</h2>';
  optionsContainer.innerHTML = "";

  if (incorrectAnswers > correctAnswers) {
    feedbackElement.className = "incorrect";
  } else {
    feedbackElement.className = "correct";
  }

  feedbackElement.innerHTML = `Correctas: ${correctAnswers} | Incorrectas: ${incorrectAnswers} | Tiempo: ${timeMessage}`;
  statsElement.innerHTML = "";
  nextButton.disabled = true;
  prevButton.disabled = true;

  restartContainer.innerHTML = `
    <button id="back-to-selector">Volver al Selector</button>
  `;
  restartContainer.classList.remove("hidden");
  document.getElementById("back-to-selector").addEventListener("click", () => {
    resetToSelector();
  });
}

</script>
